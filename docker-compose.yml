version: "3.8"

services:

  postgres:
    image: postgis/postgis:15-3.3
    container_name: bloodnet_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bloodnet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bloodnet_redis
    ports:
      - "6380:6379"

  ml_service:
    build: ./ml_service
    container_name: bloodnet_ml
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: bloodnet_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bloodnet
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_SERVICE_URL: http://ml_service:8001
    depends_on:
      - postgres
      - redis
      - ml_service

volumes:
  postgres_data: